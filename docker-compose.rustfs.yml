services:
  rustfs:
    image: rustfs/rustfs:latest
    command:
      - --address
      - :9000
      - --console-enable
      - --access-key
      - ${RUSTFS_S3_ACCESS_KEY:-rustfsadmin}
      - --secret-key
      - ${RUSTFS_S3_SECRET_KEY:-rustfssecret}
      - /data
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data

volumes:
  rustfs-data:
