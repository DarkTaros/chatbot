services:
  seaweedfs-master:
    image: chrislusf/seaweedfs:3.76
    command: master -ip=seaweedfs-master -mdir=/data
    ports:
      - "9333:9333"
    volumes:
      - seaweedfs-master-data:/data

  seaweedfs-volume:
    image: chrislusf/seaweedfs:3.76
    command: volume -mserver=seaweedfs-master:9333 -ip=seaweedfs-volume -dir=/data
    depends_on:
      - seaweedfs-master
    ports:
      - "8080:8080"
    volumes:
      - seaweedfs-volume-data:/data

  seaweedfs-filer:
    image: chrislusf/seaweedfs:3.76
    command: filer -master=seaweedfs-master:9333 -ip=seaweedfs-filer -defaultStoreDir=/data
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    ports:
      - "8888:8888"
    volumes:
      - seaweedfs-filer-data:/data

  seaweedfs-s3:
    image: chrislusf/seaweedfs:3.76
    entrypoint: ["/bin/sh", "/scripts/start-s3.sh"]
    depends_on:
      - seaweedfs-filer
    environment:
      SEAWEEDFS_S3_ACCESS_KEY: ${SEAWEEDFS_S3_ACCESS_KEY:-seaweedfs}
      SEAWEEDFS_S3_SECRET_KEY: ${SEAWEEDFS_S3_SECRET_KEY:-seaweedfs-secret}
    ports:
      - "8333:8333"
    volumes:
      - ./docker/seaweedfs/start-s3.sh:/scripts/start-s3.sh:ro

volumes:
  seaweedfs-master-data:
  seaweedfs-volume-data:
  seaweedfs-filer-data:
